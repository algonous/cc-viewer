<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>cc-viewer</title>
<link rel="stylesheet" href="/static/app.css">
</head>
<body>
<div id="app">
  <div id="sidebar">
    <div id="sidebar-header">
      <div id="search-wrapper">
        <input id="filter-input" type="text" placeholder="Search" autocomplete="off" spellcheck="false">
        <span id="session-count"></span>
      </div>
    </div>
    <div id="session-list"></div>
  </div>
  <div id="viewer">
    <div id="viewer-header">
      <span id="viewer-title"></span>
      <div id="viewer-toolbar">
        <span id="selection-actions" class="hidden">
          <button id="btn-dump" class="toolbar-btn" title="Copy selected blocks to clipboard">Copy</button>
          <button id="btn-clear" class="toolbar-btn" title="Clear all selections">Clear</button>
          <button id="btn-export" class="toolbar-btn" title="Export selected blocks">Export</button>
        </span>
        <button id="btn-sort" class="toolbar-btn" title="Toggle round order">Oldest first</button>
      </div>
    </div>
    <div id="viewer-content"></div>
  </div>
</div>
<div id="copy-modal" class="modal hidden">
  <div class="modal-content">
    <div class="modal-title">Copy to Clipboard</div>
    <div class="modal-options">
      <button data-format="jsonl" class="modal-btn selected">JSONL</button>
      <button data-format="md" class="modal-btn">Markdown</button>
    </div>
    <div class="modal-actions">
      <button id="copy-confirm" class="modal-btn primary">Copy</button>
      <button id="copy-cancel" class="modal-btn">Cancel</button>
    </div>
  </div>
</div>
<div id="publish-modal" class="modal hidden">
  <div class="modal-content">
    <div class="modal-title">Publish Snippet</div>
    <div class="modal-field">
      <label for="publish-title">Title</label>
      <input id="publish-title" type="text" class="modal-input">
    </div>
    <div id="publish-error" class="modal-error hidden"></div>
    <div class="modal-actions">
      <button id="publish-confirm" class="modal-btn primary">Publish</button>
      <button id="publish-cancel" class="modal-btn">Cancel</button>
    </div>
  </div>
</div>
<div id="toast" class="toast hidden"></div>
<script src="/static/app.js"></script>
</body>
</html>
